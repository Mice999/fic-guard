name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller

      - name: Build executable
        run: python build.py

      - name: Rename artifact (Linux)
        if: runner.os == 'Linux'
        run: mv dist/fic-guard dist/fic-guard-linux-x64

      - name: Rename artifact (macOS)
        if: runner.os == 'macOS'
        run: mv dist/fic-guard "dist/fic-guard-macos-$(uname -m)"

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item dist\fic-guard.exe dist\fic-guard-windows-x64.exe

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/fic-guard-*
          fail_on_unmatched_files: true
          draft: true
