name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for the release (e.g. v0.2.0-alpha.4)"
        required: true

permissions:
  contents: write

jobs:
  build:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller

      - name: Build executable
        run: python build.py

      - name: Rename artifact (Linux)
        if: runner.os == 'Linux'
        run: mv dist/fic-guard dist/fic-guard-linux-x64

      - name: Build Universal Binary and package (macOS)
        if: runner.os == 'macOS'
        run: |
          pip install pyinstaller
          # build arm64
          python build.py --arch arm64
          mv dist/fic-guard dist/fic-guard-arm64
          rm -rf build dist/fic-guard.app __pycache__ *.spec
          # build x86_64
          python build.py --arch x86_64
          mv dist/fic-guard dist/fic-guard-x86_64
          rm -rf build dist/fic-guard.app __pycache__ *.spec
          # merge universal
          lipo -create -output dist/fic-guard dist/fic-guard-arm64 dist/fic-guard-x86_64
          # package as .app
          python build.py --universal
          cd dist
          zip -r fic-guard-macos-universal.zip fic-guard.app

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item dist\fic-guard.exe dist\fic-guard-windows-x64.exe

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: dist/fic-guard-*
          fail_on_unmatched_files: true
          draft: true
 
