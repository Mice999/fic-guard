{% extends "base.html" %}
{% block title %}fic-guard — 生成指纹{% endblock %}
{% block content %}
<h1>生成指纹</h1>
{% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
<form method="post" enctype="multipart/form-data">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label>上传文本文件（.txt / .md）</label>
  <input type="file" name="text_file" accept=".txt,.md,.text">
  <p class="sep">— 或 —</p>
  <label>粘贴文本</label>
  <textarea name="text_paste" rows="8" placeholder="把作品内容粘贴到这里…"></textarea>
  <label>作品 ID（仅用于文件命名，如 my-fic-ch1）</label>
  <input type="text" name="work_id" placeholder="my-fic-ch1" required>
  <button type="submit">生成并下载指纹 JSON</button>
</form>
<p class="hint">生成的 .fingerprint.json 文件请妥善保存（私人备份），可用于后续"监控"功能。</p>
{% endblock %}
